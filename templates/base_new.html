<body class="sidebar-collapsed">

<!-- Блок 1: заголовок и верхнее меню -->
<header id="block1">

        <div class="container-fluid">

                    <path d="M2.5 12.5a.5.5 0 0 1 0-1h11a.5.5 0 0 1 0 1h-11zm0-4a.5.5 0 0 1 0-1h11a.5.5 0 0 1 0 1h-11zm0-4a.5.5 0 0 1 0-1h11a.5.5 0 0 1 0 1h-11z"/>
                </svg>
            </button>



            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#topMenu" aria-controls="topMenu" aria-expanded="false" aria-label="Переключить меню">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="topMenu">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link active" href="/">ИС КОММЕРЧЕСКОЙ СЛУЖБЫ</a></li>
                    <li class="nav-item"><a class="nav-link" href="/eis/main">EIS</a></li>
                    <li class="nav-item"><a class="nav-link"  href="/prices/main">Прайс-листы</a></li>
                    <li class="nav-item"><a class="nav-link"  href="/demands/main">Заказы</a></li>
                    <li class="nav-item"><a class="nav-link"  href="/demanalis/main">Аналитика</a></li>
                    <li class="nav-item"><a class="nav-link"  href="/reports/main">Отчеты</a></li>
                    <li class="nav-item"><a class="nav-link"  href="/adminp/main">Админ</a></li>
                </ul>

                <label class="toggle me-2" >
                    <input type="checkbox" id="toggle_adm" style="display:none">
                    <span class="toggle-btn"></span>
                </label>
                <form class="d-flex" role="search" onsubmit="return false;">
                    <input class="form-control form-control-sm me-2" type="search" placeholder="Поиск" aria-label="Поиск">
                    <button class="btn btn-sm btn-light" type="submit">Найти</button>
                </form>
            </div>
        </div>
    </nav>
</header>

<!-- контент дочерних шаблонов -->



    {% block content %}
    {% endblock %}

<!-- Модальное окно -->
<div class="modal fade" id="myModal" tabindex="-1" aria-labelledby="myModalLabel" aria-hidden="true">
 <div class="modal-dialog modal-dialog-scrollable">
 <div class="modal-content">
 <div class="modal-header">
 <h5 class="modal-title" id="myModalLabel">Заголовок модального окна</h5>
 <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрыть"></button>
 </div>
 <div class="modal-body">
 <!-- Содержимое с прокруткой -->
 <div class="modal-scrollable-content">
 <p>Длинный текст...</p>
 <!-- Много контента -->
 </div>
 </div>
 <div class="modal-footer">
 <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Закрыть</button>
 <button type="button" class="btn btn-primary">Сохранить изменения</button>
 </div>
 </div>
 </div>
</div>

<!-- Подвижное окно -->
 <div class="popup " id="popup">
        <div class="popup-header" id="popupHeader">
            Резервы по выбранному изданию
            <button class="close-btn">×</button>
        </div>
        <div class="popup-content container-fluid overflow-y-auto" id="popup-content" >
            Содержимое всплывающего окна...
        </div>
 </div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    (function(){
        const body = document.body;
        const toggleBtn = document.getElementById('toggleSidebar');

        // Инициализация: на узких экранах по умолчанию скрыть сайдбар
        function initCollapse() {
            if(window.innerWidth < 992) body.classList.add('sidebar-collapsed');
            else body.classList.remove('sidebar-collapsed');
        }
        initCollapse();
        window.addEventListener('resize', initCollapse);

        // Тоггл сайдбара по кнопке
        toggleBtn.addEventListener('click', function(){
            body.classList.toggle('sidebar-collapsed');
        });

        // Закрывать сайдбар клавишей Esc
        document.addEventListener('keydown', function(e){
            if(e.key === 'Escape') body.classList.add('sidebar-collapsed');
        });

        // Доступность: при открытии сайдбара фокусируем его (необязательно)
        const sidebar = document.getElementById('sidebar');
        toggleBtn.addEventListener('click', function(){
            if(!body.classList.contains('sidebar-collapsed')) {
                setTimeout(()=> sidebar.querySelector('a, button')?.focus(), 250);
            } else {
                document.getElementById('mainContent').focus();
            }
        });
    })();
</script>
</body>
</html>


<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Ландшафт</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="{{ url_for('static', filename='js/three.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/three/examples/jsm/loaders/GLTFLoader.js') }}"></script>
</head>
<body>
    <script type="importmap">
        {
            "imports": {
                "three": "/static/js/three/build/three.module.js",
                "three/addons/": "/static/js/three/examples/jsm/"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        var scene, camera, renderer;

        function init() {

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer();
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

//https://threejs.org/examples/#webgl_animation_multiple
            //https://threejs.org/manual/examples/load-gltf.html
            // Создание кубов
            const geometry = new THREE.BoxGeometry(1, 1, 1);
            var last_cube;
            for (let i= 1; i<10; i++){
                    let mat = new THREE.MeshBasicMaterial({ color: Math.random() * 0xffffff });
                    let cube = new THREE.Mesh(geometry, mat);
                    cube.name = "cube_" + i;
                    cube.position.set(Math.random() * 5, Math.random() * 5, Math.random() * 5);  // Высота куба - случайная
                    //cube.material.color.set(Math.random() * 0xffffff); // Устанавливаем случайный цвет
                    last_cube = cube
                    scene.add(cube);
            }
            camera.position.z = 15;


            const gltfLoader = new THREE.GLTFLoader();
            alert("Да блин!");
            gltfLoader.load( 'https://threejs.org/manual/examples/resources/models/cartoon_lowpoly_small_city_free_pack/scene.gltf', ( gltf ) => {
			const root = gltf.scene;
			scene.add( root );
            } );



            animate();
        }

        //const loader = new THREE.ColladaLoader();
        //loader.load("https://book-self.ru/fistest/source/pr.dae", function (result) {
        //            const mesh_source = result.scene.children[2];
        //            const mesh = new THREE.Mesh(mesh_source.geometry, new THREE.MeshNormalMaterial());
        //            scene.add(mesh);
        //            camera.position.set(5, 5, 5);
        //            camera.lookAt(0, 0, 0);
        //            renderer.render(scene, camera);
        //            }
        //);


        var direction = true;

        function update_position(){
            if (camera.position.z < 10) {
                   direction = true;
            }
            if (camera.position.z > 30) {
                   direction = false;
            }
            if (direction){
                camera.position.z += 1;
            }
            else {
                camera.position.z -= 1;
            }
        }


        function animate() {
            update_position();
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
